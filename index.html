<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CSS Engineers - Transmission Line Survey, Geotechnical & Foundation Engineering Solutions">
  <meta name="theme-color" content="#2ba4f0">
  
  <title>CSS Engineers | Transmission Line & Geotechnical Engineering</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Header & Navigation -->
  <header id="header" class="header">
    <div class="header-container">
      <div class="header-logo">
        <img id="header-logo-img" src="" alt="CSS Engineers" class="logo">
        <span id="header-company-name" class="company-name"></span>
      </div>
      <nav class="nav">
        <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul id="nav-list" class="nav-list"></ul>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main>
    <!-- Hero / Home Section -->
    <section id="home" class="section section-dark">
      <div class="container">
        <div class="hero">
          <p id="hero-eyebrow" class="hero-eyebrow"></p>
          <h1 id="hero-title" class="hero-title"></h1>
          <p id="hero-tagline" class="hero-tagline"></p>
          <div class="hero-cta">
            <a href="#services" class="btn btn-primary">Explore Services</a>
            <a href="#contact" class="btn btn-secondary">Get in Touch</a>
          </div>
        </div>
      </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section section-light">
      <div class="container">
        <h2 class="section-title">About Us</h2>
        <div class="about-grid">
          <div id="about-content" class="about-content"></div>
          <aside id="about-legal" class="about-legal"></aside>
        </div>
      </div>
    </section>

    <!-- Services Section -->
    <section id="services" class="section section-dark">
      <div class="container">
        <h2 class="section-title">Our Services</h2>
        <p class="section-subtitle" id="services-subtitle"></p>
        <div id="services-grid" class="services-grid"></div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section section-light">
      <div class="container">
        <h2 class="section-title">Projects</h2>
        <p class="section-subtitle" id="projects-subtitle"></p>
        <div id="projects-summary" class="projects-summary"></div>
        <div class="table-responsive">
          <table id="projects-table" class="projects-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Work Description</th>
                <th>Km</th>
                <th>Client</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Clients Section -->
    <section id="clients" class="section section-dark">
      <div class="container">
        <h2 class="section-title">Our Clients</h2>
        <p class="section-subtitle" id="clients-subtitle"></p>
        <div id="clients-grid" class="clients-grid"></div>
      </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="section section-light">
      <div class="container">
        <h2 class="section-title">Gallery</h2>
        <p class="section-subtitle" id="gallery-subtitle"></p>
        <div id="gallery-grid" class="gallery-grid"></div>
      </div>
    </section>

    <!-- Sample Reports Section -->
    <section id="sample-reports" class="section section-dark">
      <div class="container">
        <h2 class="section-title">Sample Reports</h2>
        <p class="section-subtitle" id="reports-subtitle"></p>
        <div id="reports-grid" class="reports-grid"></div>
      </div>
    </section>

    <!-- Equipment & Team Section -->
    <section id="equipment" class="section section-light">
      <div class="container">
        <h2 class="section-title">Equipment & Team</h2>
        <p class="section-subtitle" id="equipment-subtitle"></p>
        <div id="equipment-grid" class="equipment-grid"></div>
      </div>
    </section>

    <!-- Why Us Section -->
    <section id="why-us" class="section section-accent">
      <div class="container">
        <h2 class="section-title">Why Choose Us</h2>
        <p id="why-us-headline" class="why-us-headline"></p>
        <div id="why-us-strengths" class="why-us-strengths"></div>
        <div id="why-us-stats" class="why-us-stats"></div>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section section-dark">
      <div class="container">
        <h2 class="section-title">Contact Us</h2>
        <p class="section-subtitle" id="contact-subtitle"></p>
        <div class="contact-grid">
          <div id="contact-info" class="contact-info"></div>
          <div id="contact-map" class="contact-map"></div>
        </div>
        <div id="contact-form-container" class="contact-form-container"></div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer" class="footer"></footer>

  <!-- Scripts -->
  <script src="assets/js/main.js" defer></script>
</body>
</html>
